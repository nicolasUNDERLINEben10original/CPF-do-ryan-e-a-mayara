<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de CPF Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-circles">
        <div class="circle cyan"></div>
        <div class="circle purple"></div>
    </div>

    <div class="glass-card">
        <h1>Gerador de <span class="gradient-text">CPF</span></h1>
        <p>Gere números válidos para testes de software</p>

        <div class="display-container" onclick="copiarCPF()">
            <span id="cpf-resultado">000.000.000-00</span>
            <div class="copy-badge" id="copy-badge">Copiar</div>
        </div>

        <button class="main-btn" onclick="gerarNovoCPF()">
            Gerar CPF
        </button>
        
        <div class="footer-info">
            <small>Clique no número para copiar</small>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
